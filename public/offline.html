<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f19" />
  <title>AuraBuja — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0b0f19;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #9ca3af; font-size: 0.875rem; max-width: 320px; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    .brand {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #4b5563;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Pas de connexion</h1>
  <p>
    Vous semblez ne pas avoir de connexion Internet.
    Verifiez votre reseau et reessayez.
    Vos donnees seront synchronisees automatiquement au retour du reseau.
  </p>
  <button onclick="window.location.reload()">Reessayer</button>
  <div class="brand">AURABUJA</div>
</body>
</html>
