<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111318" /> <!-- gray-950 -->
  <title>Nunulia — Hors ligne</title>
  <style>
    :root {
      --bg-950: #111318;    /* gray-950 */
      --text-100: #f3f4f6;  /* gray-100 */
      --text-400: #9ca3af;  /* gray-400 */
      --text-700: #374151;  /* gray-700 */
      --gold-400: #F5C842;
      --gold-600: #D4941A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-950);
      color: var(--text-100);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.6s ease-out;
    }
    .brand-name {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
    }
    .offline-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p {
      color: var(--text-400);
      font-size: 0.875rem;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
      color: var(--bg-950);
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.7rem;
      color: var(--text-700);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
