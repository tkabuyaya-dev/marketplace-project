<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDDA4A"/>
      <stop offset="50%" stop-color="#E8B817"/>
      <stop offset="100%" stop-color="#C08008"/>
    </linearGradient>
    <radialGradient id="bgShine" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#FEE88A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B817" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="darkFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="litFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="60%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="drop" x="-8%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Golden rounded background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#bgShine)"/>

  <g filter="url(#drop)">
    <!-- Cart handle (curved hook top-left) -->
    <path d="M138,85 C100,85 82,115 82,148 L82,200"
          stroke="#000" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M138,80 C102,80 86,108 86,142 L86,195"
          stroke="#333" stroke-width="24" fill="none" stroke-linecap="round"/>
    <path d="M138,76 C106,76 90,102 90,135 L90,185"
          stroke="#4a4a4a" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Letter N — 3D extrusion (back shadow) -->
    <g opacity="0.85">
      <polygon points="130,105 130,380 180,380 180,200 320,380 370,380 370,105 320,105 320,290 180,105" fill="#000" transform="translate(5,8)"/>
    </g>

    <!-- Letter N — front face left vertical -->
    <polygon points="130,100 130,375 178,375 178,100" fill="url(#litFace)"/>

    <!-- Letter N — diagonal -->
    <polygon points="130,100 178,100 370,340 370,375 322,375 130,135" fill="url(#darkFace)"/>

    <!-- Letter N — front face right vertical -->
    <polygon points="322,100 370,100 370,375 322,375" fill="url(#litFace)"/>

    <!-- Top highlight edges -->
    <line x1="130" y1="100" x2="178" y2="100" stroke="#555" stroke-width="2.5" opacity="0.4"/>
    <line x1="322" y1="100" x2="370" y2="100" stroke="#555" stroke-width="2.5" opacity="0.4"/>
    <!-- Left edge highlight -->
    <line x1="130" y1="100" x2="130" y2="375" stroke="#555" stroke-width="2" opacity="0.3"/>

    <!-- Cart body — bottom platform -->
    <path d="M115,373 L385,373 L395,395 L108,395 Z" fill="#1a1a1a"/>
    <line x1="115" y1="373" x2="385" y2="373" stroke="#3a3a3a" stroke-width="1.5" opacity="0.5"/>

    <!-- Cart right wall -->
    <polygon points="370,100 405,100 415,240 395,395 385,373 370,375" fill="#1a1a1a" opacity="0.7"/>
    <line x1="405" y1="100" x2="415" y2="240" stroke="#444" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- Wheels -->
  <circle cx="195" cy="430" r="28" fill="#111"/>
  <circle cx="195" cy="430" r="23" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <circle cx="195" cy="430" r="10" fill="#C08008"/>
  <circle cx="195" cy="430" r="4.5" fill="#1a1a1a"/>
  <path d="M180,417 A18,18 0 0,1 210,417" fill="none" stroke="#444" stroke-width="1.5" opacity="0.3"/>

  <circle cx="340" cy="430" r="28" fill="#111"/>
  <circle cx="340" cy="430" r="23" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <circle cx="340" cy="430" r="10" fill="#C08008"/>
  <circle cx="340" cy="430" r="4.5" fill="#1a1a1a"/>
  <path d="M325,417 A18,18 0 0,1 355,417" fill="none" stroke="#444" stroke-width="1.5" opacity="0.3"/>
</svg>
