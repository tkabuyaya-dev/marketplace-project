name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Déploiement production : manuel via GitHub Actions UI
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Déployer en production ?'
        required: true
        default: 'false'
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  functions-build:
    name: Build Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Build functions
        working-directory: functions
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint-and-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --run

  # ── E2E Playwright ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
        continue-on-error: true

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/e2e/
          retention-days: 7

  # ── Deploy → Staging (auto sur push main) ───────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [lint-and-build, test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (staging)
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY_STAGING }}
          VITE_FIREBASE_AUTH_DOMAIN: nunulia-staging.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: nunulia-staging
          VITE_FIREBASE_STORAGE_BUCKET: nunulia-staging.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID_STAGING }}
          VITE_CLOUDINARY_CLOUD_NAME: dyqzcbjnz
          VITE_CLOUDINARY_UPLOAD_PRESET: aurabuja-staging
          VITE_CLOUDINARY_API_KEY: 825691158576526
          VITE_CLOUDINARY_FOLDER: aurabuja-staging-2026
          VITE_ALGOLIA_APP_ID: NZ5TI2OD7P
          VITE_ALGOLIA_SEARCH_KEY: ${{ secrets.VITE_ALGOLIA_SEARCH_KEY_STAGING }}
          VITE_FUNCTIONS_BASE_URL: https://europe-west1-nunulia-staging.cloudfunctions.net
          VITE_APP_NAME: 'Nunulia STAGING'
          VITE_APP_ENV: staging
          VITE_RECAPTCHA_V3_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_V3_SITE_KEY_STAGING }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          channelId: live
          projectId: nunulia-staging

  # ── Deploy → Production (manuel uniquement) ──────────────────────────────────
  # ⚠️  IMPORTANT — Le build prod DOIT se faire ici (pas via l'artifact de
  # lint-and-build) car lint-and-build n'a aucune VITE_* env var → bundle
  # avec config Firebase/Algolia/Cloudinary vide. Voir staging pour le pattern.
  deploy-hosting:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]
    if: >
      (github.ref == 'refs/heads/main' && github.event_name == 'push')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_production == 'true')
    environment:
      name: production
      url: https://nunulia.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (production)
        run: npm run build
        env:
          # Firebase prod (secrets non suffixés = convention prod)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: nunulia.com
          VITE_FIREBASE_PROJECT_ID: aurburundi-e2fe2
          VITE_FIREBASE_STORAGE_BUCKET: aurburundi-e2fe2.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          # Cloudinary prod
          VITE_CLOUDINARY_CLOUD_NAME: dyqzcbjnz
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_CLOUDINARY_API_KEY: ${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_FOLDER: aurabuja-app-2026
          # Algolia prod
          VITE_ALGOLIA_APP_ID: NZ5TI2OD7P
          VITE_ALGOLIA_SEARCH_KEY: ${{ secrets.VITE_ALGOLIA_SEARCH_KEY }}
          # Cloud Functions prod (région europe-west1)
          VITE_FUNCTIONS_BASE_URL: https://europe-west1-aurburundi-e2fe2.cloudfunctions.net
          # App config
          VITE_APP_NAME: Nunulia
          VITE_APP_ENV: production
          VITE_ENABLE_APP_CHECK: 'true'
          VITE_RECAPTCHA_V3_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_V3_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: aurburundi-e2fe2

  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: [functions-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FUNCTIONS_DISCOVERY_TIMEOUT: "60000"
